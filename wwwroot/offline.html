<!DOCTYPE html>
<html lang="tr" data-theme="gold-dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Çevrimdışı - GoldBranch AI</title>
    <meta name="theme-color" content="#0d1117">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background-color: #0d1117;
            color: #f0f6fc;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 500px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        i.icon {
            font-size: 4rem;
            color: #fbbf24;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        p {
            color: #8b949e;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        button {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.5);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <i class="fa-solid fa-satellite-dish icon"></i>
        <h1>Sinyal Koptu</h1>
        <p>Görünüşe göre internet bağlantınız kesildi veya sunucuya ulaşılamıyor. GoldBranch AI verilerinizi güvende tutuyor. Lütfen bağlantınızı kontrol edin.</p>
        <button onclick="window.location.reload()">Tekrar Dene</button>
    </div>
</body>
</html>
